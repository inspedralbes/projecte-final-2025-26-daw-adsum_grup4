server {
    listen 80;
    server_name adsum.daw.inspedralbes.cat localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression para mejorar la velocidad de carga
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Proxy para la API (Reverse Proxy)
    # Redirige peticiones de /api/ al contenedor del backend
    location /api/ {
        proxy_pass http://backend:3000/; # El '/' al final es importante para quitar /api del path
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy para WebSockets (Socket.io)
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Configuración para Single Page Application (SPA - Vue)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Manejo de assets estáticos (caché del navegador)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
