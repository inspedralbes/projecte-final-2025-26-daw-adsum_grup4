name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BA: ${{ github.repository_owner }}/adsum-backend
  IMAGE_NAME_FE: ${{ github.repository_owner }}/adsum-frontend

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests
        run: npm run test -- --coverage

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm run test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}:${{ github.ref_name }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:${{ github.ref_name }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Upload backend image
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend.tar
          retention-days: 1

      - name: Upload frontend image
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend.tar
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Docker images
        run: |
          docker load --input /tmp/backend.tar
          docker load --input /tmp/frontend.tar

      - name: Tag images for registry
        run: |
          docker tag adsum-backend-prod ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}:latest
          docker tag adsum-frontend-prod ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:latest

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:latest

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "=== Connecting to $SERVER_USER@$SERVER_IP ==="
          
          ssh $SERVER_USER@$SERVER_IP << 'EOF'
            set -e
            
            echo "=== Pulling latest images ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:latest
            
            echo "=== Stopping old containers ==="
            docker compose -f /opt/adsum/docker-compose.prod.yml down || true
            
            echo "=== Updating docker-compose.yml references ==="
            sed -i 's|image: adsum-backend-prod|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BA }}:latest|' /opt/adsum/docker-compose.prod.yml
            sed -i 's|image: adsum-frontend-prod|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FE }}:latest|' /opt/adsum/docker-compose.prod.yml
            
            echo "=== Starting containers ==="
            docker compose -f /opt/adsum/docker-compose.prod.yml up -d
            
            echo "=== Checking container status ==="
            docker compose -f /opt/adsum/docker-compose.prod.yml ps
            
            echo "=== Deployment completed ==="
          EOF
          
          echo "=== Deployment successful ==="

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          docker system prune -f --filter "until=1h" || true