version: '3.8'

services:
  db:
    image: mysql:8
    container_name: adsum_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data_prod:/var/lib/mysql
      - mysql_init:/docker-entrypoint-initdb.d
    networks:
      - adsum_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_root_password
      - db_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: adsum-backend-prod
    container_name: adsum_backend_prod
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=/run/secrets/db_password
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adsum_network
    secrets:
      - db_password

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: adsum-frontend-prod
    container_name: adsum_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - adsum_network

networks:
  adsum_network:
    driver: bridge

volumes:
  db_data_prod:
  mysql_init:

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt